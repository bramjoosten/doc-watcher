[confluence]
base_url = "https://confluence.example.com"
pat_env = "CONFLUENCE_PAT"
verify_tls = true

[paths]
output_dir = "./docs"
state_dir  = "./.state"
cache_html = false

[sync]
# parallel_downloads is autotuned: on first run (or whenever this key is missing),
# doc-watcher runs a short benchmark to find the value that downloads fastest
# without tripping errors on your network + server combo, and writes the result
# back here. To re-trigger the benchmark, delete the key (or its value). To pin
# a specific value, just edit it — the bench won't overwrite a hand-set value
# during normal startup. Run `npm start -- bench` to force a re-benchmark.
parallel_downloads    = 10

include_attachments   = true
poll_interval_seconds = 600

[[watch]]
type = "space"
key  = "ENG"

[[watch]]
type         = "tree"
root_page_id = "123456"
