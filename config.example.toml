[confluence]
base_url = "https://confluence.example.com"
pat_env = "CONFLUENCE_PAT"
verify_tls = true

[paths]
output_dir = "./docs"
state_dir  = "./.state"
cache_html = false

[sync]
# parallel_downloads is autotuned: leave it absent (or delete it later) and
# `npm start` runs a short benchmark on first start, picks the fastest value
# that doesn't trip errors on your network + server, and writes the chosen
# number back here. Edit by hand to pin a specific value — the bench won't
# overwrite a hand-set value on normal startup. Re-run anytime with
# `npm start -- bench`.
# parallel_downloads = 10

# Inline images referenced via ac:image macros. Set to true once you've gauged
# bandwidth on a small first sync — a space with diagrams can easily push tens of GB.
# Non-inline file attachments (PDFs, decks, etc.) are not mirrored either way.
include_attachments   = false

# Only used by the opt-in `poll` mode (`npm start -- poll`), which loops
# sync forever at this cadence. The default `npm start` is one-shot — run
# it again whenever you want fresh docs.
poll_interval_seconds = 600

# What to mirror. Each [[watch]] block adds one scope; list as many as you want.
# Two shapes:
#   - type = "space"  → mirror a whole Confluence space by its key.
#   - type = "tree"   → mirror one page plus everything under it (any depth).
#                       Use this for a team's landing page, a project, or any
#                       sub-tree you care about. Find the page id in the URL
#                       (?pageId=NNNNN) — if you only see the pretty URL form
#                       /display/SPACE/Title, click Edit and the id shows up.
# Scopes are unioned: a page is mirrored if it matches any [[watch]] entry.

[[watch]]
type = "space"
key  = "ENG"

[[watch]]
type         = "tree"
root_page_id = "123456"   # e.g. "Team Foo — Docs" landing page

# Add more tree roots as needed:
# [[watch]]
# type         = "tree"
# root_page_id = "234567"   # e.g. Team Bar
#
# [[watch]]
# type         = "tree"
# root_page_id = "345678"   # e.g. a specific project sub-tree
